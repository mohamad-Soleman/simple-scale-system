# Build Windows + Mac and publish as GitHub Release.
# Run manually (Actions → Build and release → Run workflow).
# Input: version tag (e.g. v1.0.0). Output: Windows ZIP + Mac ZIP attached to the release.

name: Build and release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller scale_app.spec

      - name: Create products.db with schema
        run: |
          python -c "
          import sqlite3
          from pathlib import Path
          p = Path('dist/ScaleApp/products.db')
          p.parent.mkdir(parents=True, exist_ok=True)
          conn = sqlite3.connect(str(p))
          conn.executescript(Path('schema.sql').read_text(encoding='utf-8'))
          conn.close()
          "

      - name: Add sample config
        run: |
          Copy-Item -Path "config.ini.sample" -Destination "dist/ScaleApp/config.ini"

      - name: Create Windows release ZIP
        run: |
          $zipName = "POS-Scale-App-${{ github.event.inputs.version_tag }}-windows.zip"
          Compress-Archive -Path "dist/ScaleApp\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: POS-Scale-App-${{ github.event.inputs.version_tag }}-windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller scale_app.spec

      - name: Create products.db with schema
        run: |
          python -c "
          import sqlite3
          from pathlib import Path
          p = Path('dist/ScaleApp/products.db')
          p.parent.mkdir(parents=True, exist_ok=True)
          conn = sqlite3.connect(str(p))
          conn.executescript(Path('schema.sql').read_text(encoding='utf-8'))
          conn.close()
          "

      - name: Add sample config
        run: |
          cp config.ini.sample dist/ScaleApp/config.ini

      - name: Create Mac release ZIP
        run: |
          cd dist/ScaleApp && zip -r ../../POS-Scale-App-${{ github.event.inputs.version_tag }}-mac.zip . && cd ../..

      - name: Upload Mac ZIP
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: POS-Scale-App-${{ github.event.inputs.version_tag }}-mac.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-mac]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create Release and upload ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: POS Scale App ${{ github.event.inputs.version_tag }}
          body: |
            **Windows:** Extract `POS-Scale-App-*-windows.zip` and run `ScaleApp.exe`.
            **Mac:** Extract `POS-Scale-App-*-mac.zip` and run the `ScaleApp` binary from the extracted folder (e.g. `./ScaleApp` in Terminal, or double-click if your system allows).
            Both ZIPs include `products.db` (empty schema) and `config.ini` (sample). On Mac, set the serial port in `config.ini` (e.g. `/dev/cu.usbserial-*`). Printing is supported on Windows; on Mac it may show an error unless a Mac printer path is added.
          files: |
            POS-Scale-App-${{ github.event.inputs.version_tag }}-windows.zip
            POS-Scale-App-${{ github.event.inputs.version_tag }}-mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
