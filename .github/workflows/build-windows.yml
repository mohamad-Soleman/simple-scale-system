# Build Windows EXE and publish as GitHub Release.
# Run manually (Actions → Build and release Windows EXE → Run workflow).
# Input: version tag (e.g. v1.0.0). Output: ZIP with exe + dependencies + products.db + config.

name: Build and release Windows EXE

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller scale_app.spec

      - name: Create products.db with schema
        run: |
          python -c "
          import sqlite3
          from pathlib import Path
          p = Path('dist/ScaleApp/products.db')
          p.parent.mkdir(parents=True, exist_ok=True)
          conn = sqlite3.connect(str(p))
          conn.executescript(Path('schema.sql').read_text(encoding='utf-8'))
          conn.close()
          "

      - name: Add sample config
        run: |
          Copy-Item -Path "config.ini.sample" -Destination "dist/ScaleApp/config.ini"

      - name: Create release ZIP
        run: |
          $zipName = "POS-Scale-App-${{ github.event.inputs.version_tag }}-windows.zip"
          Compress-Archive -Path "dist/ScaleApp\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: POS Scale App ${{ github.event.inputs.version_tag }}
          body: |
            Windows release — run on the scale machine after extracting the ZIP.
            **Included:** ScaleApp.exe, dependencies, `products.db` (empty schema), `config.ini` (sample).
            Place nothing else required; run `ScaleApp.exe` from the extracted folder.
          files: POS-Scale-App-${{ github.event.inputs.version_tag }}-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
